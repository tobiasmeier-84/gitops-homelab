repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate

  - repo: https://github.com/ansible/ansible-lint
    rev: v24.9.0
    hooks:
      - id: ansible-lint

# NOTE: pre-commit hooks are a local convenience, not the enforcement
# boundary — see ADR log / Cluster/GitOps layer. The GitHub Actions CI
# checks (.github/workflows/) are the actual required gate before merge,
# since local hooks can be bypassed with --no-verify.
